services:
  - type: web
    name: smart-threat-system-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false # You will need to input your key in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
